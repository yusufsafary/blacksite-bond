<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access — BLACKSITE.BOND</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23000'/%3E%3Crect x='1.5' y='1.5' width='37' height='37' fill='none' stroke='%23fff' stroke-width='0.75'/%3E%3Cline x1='1.5' y1='8' x2='1.5' y2='1.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='1.5' y1='1.5' x2='8' y2='1.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='32' y1='1.5' x2='38.5' y2='1.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='38.5' y1='1.5' x2='38.5' y2='8' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='1.5' y1='32' x2='1.5' y2='38.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='1.5' y1='38.5' x2='8' y2='38.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='38.5' y1='32' x2='38.5' y2='38.5' stroke='%23fff' stroke-width='1.5'/%3E%3Cline x1='32' y1='38.5' x2='38.5' y2='38.5' stroke='%23fff' stroke-width='1.5'/%3E%3Crect x='10' y='9' width='5' height='22' fill='%23fff'/%3E%3Crect x='15' y='9' width='14' height='9' fill='%23fff'/%3E%3Crect x='15' y='22' width='14' height='9' fill='%23fff'/%3E%3Cline x1='29' y1='18' x2='15' y2='22' stroke='%23000' stroke-width='2'/%3E%3C/svg%3E"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --black:#000;--white:#fff;
      --dim:rgba(255,255,255,0.45);
      --muted:rgba(255,255,255,0.2);
      --line:rgba(255,255,255,0.1);
      --error:rgba(255,80,80,0.85);
      --font:'Space Grotesk',sans-serif;
      --mono:'SF Mono','Fira Code',monospace;
    }
    html{scroll-behavior:smooth}
    body{
      background:var(--black);color:var(--white);
      font-family:var(--font);-webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;flex-direction:column;
    }
    a{color:inherit;text-decoration:none}
    ::selection{background:var(--white);color:var(--black)}

    /* grid bg */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
      background-size:60px 60px;
    }

    /* top bar */
    .topbar{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:56px;padding:0 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--line);
      background:rgba(0,0,0,0.85);
      backdrop-filter:blur(12px);
    }
    .topbar-brand{display:flex;align-items:center;gap:.75rem}
    .topbar-wordmark{font-size:.75rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
    .topbar-back{
      font-size:.625rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
      color:var(--dim);transition:color .2s;
    }
    .topbar-back:hover{color:var(--white)}

    /* main layout */
    main{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:80px 1.5rem 3rem;position:relative;z-index:1;
    }

    .login-box{
      width:100%;max-width:400px;
      animation:fadeUp .5s ease forwards;
    }

    .login-header{margin-bottom:2.5rem}
    .login-status{
      font-family:var(--mono);font-size:.5rem;letter-spacing:.22em;
      text-transform:uppercase;color:var(--dim);
      display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;
    }
    .status-dot{
      width:6px;height:6px;background:var(--white);opacity:.6;
      border-radius:50%;animation:pulse 2s ease-in-out infinite;
    }
    .login-title{
      font-size:2rem;font-weight:700;letter-spacing:-.03em;line-height:1.1;
      margin-bottom:.75rem;
    }
    .login-sub{
      font-size:.8125rem;font-weight:300;line-height:1.7;
      color:rgba(255,255,255,.45);
    }

    /* form */
    .login-form{display:flex;flex-direction:column;gap:1rem}

    .field{display:flex;flex-direction:column;gap:.5rem}
    .field-label{
      font-family:var(--mono);font-size:.5rem;letter-spacing:.18em;
      text-transform:uppercase;color:rgba(255,255,255,.35);
    }
    .field-input{
      background:transparent;border:1px solid var(--line);
      color:var(--white);font-family:var(--font);font-size:.875rem;
      padding:.875rem 1rem;outline:none;width:100%;
      transition:border-color .2s;
    }
    .field-input::placeholder{color:rgba(255,255,255,.2)}
    .field-input:focus{border-color:rgba(255,255,255,.4)}
    .field-input.error{border-color:var(--error)}

    .error-msg{
      font-family:var(--mono);font-size:.5rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--error);
      min-height:1em;transition:opacity .2s;
    }

    .btn-submit{
      margin-top:.5rem;
      display:flex;align-items:center;justify-content:center;gap:.75rem;
      font-family:var(--font);font-size:.75rem;font-weight:600;
      letter-spacing:.14em;text-transform:uppercase;
      background:var(--white);color:var(--black);
      padding:.9375rem 1.75rem;border:1px solid var(--white);
      cursor:pointer;transition:opacity .2s;width:100%;
    }
    .btn-submit:hover{opacity:.85}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed}
    .btn-submit .arrow{transition:transform .2s}
    .btn-submit:hover:not(:disabled) .arrow{transform:translateX(3px)}

    .login-footer{
      margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--line);
      font-family:var(--mono);font-size:.5rem;letter-spacing:.14em;
      text-transform:uppercase;color:rgba(255,255,255,.2);
      text-align:center;
    }

    /* divider */
    .divider{
      display:flex;align-items:center;gap:1rem;
      margin:.25rem 0;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;background:var(--line);
    }
    .divider-text{
      font-family:var(--mono);font-size:.4375rem;letter-spacing:.15em;
      text-transform:uppercase;color:rgba(255,255,255,.2);white-space:nowrap;
    }

    .btn-demo{
      display:flex;align-items:center;justify-content:center;gap:.75rem;
      font-family:var(--font);font-size:.6875rem;font-weight:500;
      letter-spacing:.12em;text-transform:uppercase;
      background:transparent;color:var(--dim);
      padding:.8125rem 1.75rem;border:1px solid var(--line);
      cursor:pointer;transition:border-color .2s,color .2s;width:100%;
    }
    .btn-demo:hover{border-color:var(--muted);color:var(--white)}

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes pulse{
      0%,100%{opacity:.4}50%{opacity:1}
    }

    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--black)}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <a href="/">
        <svg width="24" height="24" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" fill="#000"/>
          <rect x="1.5" y="1.5" width="37" height="37" fill="none" stroke="white" stroke-width="0.75"/>
          <line x1="1.5" y1="8" x2="1.5" y2="1.5" stroke="white" stroke-width="1.5"/>
          <line x1="1.5" y1="1.5" x2="8" y2="1.5" stroke="white" stroke-width="1.5"/>
          <line x1="32" y1="1.5" x2="38.5" y2="1.5" stroke="white" stroke-width="1.5"/>
          <line x1="38.5" y1="1.5" x2="38.5" y2="8" stroke="white" stroke-width="1.5"/>
          <line x1="1.5" y1="32" x2="1.5" y2="38.5" stroke="white" stroke-width="1.5"/>
          <line x1="1.5" y1="38.5" x2="8" y2="38.5" stroke="white" stroke-width="1.5"/>
          <line x1="38.5" y1="32" x2="38.5" y2="38.5" stroke="white" stroke-width="1.5"/>
          <line x1="32" y1="38.5" x2="38.5" y2="38.5" stroke="white" stroke-width="1.5"/>
          <rect x="10" y="9" width="5" height="22" fill="white"/>
          <rect x="15" y="9" width="14" height="9" fill="white"/>
          <rect x="15" y="22" width="14" height="9" fill="white"/>
          <line x1="29" y1="18" x2="15" y2="22" stroke="black" stroke-width="2"/>
        </svg>
      </a>
      <span class="topbar-wordmark">BLACKSITE</span>
    </div>
    <a href="/" class="topbar-back">← Back to home</a>
  </div>

  <main>
    <div class="login-box">
      <div class="login-header">
        <div class="login-status">
          <div class="status-dot"></div>
          BST-01 // Operator Access
        </div>
        <h1 class="login-title">Request<br/>Access.</h1>
        <p class="login-sub">Enter your credentials to access the BLACKSITE console and deploy your first operation.</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field">
          <label class="field-label" for="email">Operator ID (Email)</label>
          <input class="field-input" type="email" id="email" placeholder="you@company.com" autocomplete="email" required/>
        </div>
        <div class="field">
          <label class="field-label" for="password">Access Code</label>
          <input class="field-input" type="password" id="password" placeholder="Min. 6 characters" autocomplete="current-password" required/>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="btn-submit" id="submitBtn">
          <span id="btnText">Authenticate</span>
          <span class="arrow">→</span>
        </button>

        <div class="divider"><span class="divider-text">or try without account</span></div>

        <button type="button" class="btn-demo" id="demoBtn">
          Continue as Guest
        </button>
      </form>

      <div class="login-footer">
        BLACKSITE.BOND &nbsp;·&nbsp; Clearance Level I &nbsp;·&nbsp; Demo Access Enabled
      </div>
    </div>
  </main>

  <script>
    // Check if already logged in
    if (localStorage.getItem('bst_session')) {
      window.location.href = '/app';
    }

    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const demoBtn = document.getElementById('demoBtn');

    function setError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.opacity = '1';
    }

    function clearError() {
      errorMsg.textContent = '';
    }

    function setLoading(val) {
      submitBtn.disabled = val;
      btnText.textContent = val ? 'Authenticating...' : 'Authenticate';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email = emailEl.value.trim();
      const pass = passEl.value;

      if (!email || !email.includes('@')) {
        setError('Invalid operator ID. Enter a valid email.');
        emailEl.classList.add('error');
        return;
      }
      if (pass.length < 6) {
        setError('Access code must be at least 6 characters.');
        passEl.classList.add('error');
        return;
      }

      emailEl.classList.remove('error');
      passEl.classList.remove('error');
      setLoading(true);

      // Simulate auth delay
      await new Promise(r => setTimeout(r, 900));

      // Store session
      localStorage.setItem('bst_session', JSON.stringify({
        email,
        name: email.split('@')[0],
        loginAt: Date.now(),
        clearance: 'I',
        opId: 'BST-OP-' + Math.floor(Math.random() * 900 + 100)
      }));

      window.location.href = '/app';
    });

    demoBtn.addEventListener('click', async () => {
      demoBtn.disabled = true;
      demoBtn.textContent = 'Initializing...';
      await new Promise(r => setTimeout(r, 600));
      localStorage.setItem('bst_session', JSON.stringify({
        email: 'guest@blacksite.bond',
        name: 'guest',
        loginAt: Date.now(),
        clearance: 'I',
        opId: 'BST-GUEST-' + Math.floor(Math.random() * 900 + 100),
        isGuest: true
      }));
      window.location.href = '/app';
    });

    [emailEl, passEl].forEach(el => {
      el.addEventListener('input', () => {
        el.classList.remove('error');
        clearError();
      });
    });
  </script>
</body>
</html>
